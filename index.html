<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty MetriXs</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* YOUR BLACK, WHITE, AND TEAL THEME */
        :root { --teal: #0d9488; --dark: #111827; --bg: #ffffff; --gray: #f3f4f6; }
        
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid var(--dark); padding-bottom: 10px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: var(--gray); padding: 5px; border-radius: 8px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; color: #666; transition: 0.2s; }
        .tab.active { background: var(--dark); color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card { background: white; padding: 20px; border-radius: 12px; border: 2px solid var(--dark); margin-bottom: 20px; box-shadow: 4px 4px 0px var(--teal); }
        
        h2, h3 { color: var(--dark); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid var(--dark); border-radius: 6px; font-size: 1rem; }
        
        button { width: 100%; padding: 12px; background: var(--teal); color: white; border: 2px solid var(--dark); border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: var(--dark); }
        
        .info-icon { cursor: pointer; color: var(--teal); font-size: 1rem; margin-left: 5px; border: 1px solid var(--teal); padding: 0 5px; border-radius: 50%; }
        
        .result-box { margin-top: 15px; padding: 15px; background: var(--gray); border: 2px dashed var(--teal); text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Beauty MetriXs</h1>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('platforms')">Platforms</div>
        <div class="tab" onclick="switchTab('content')">Content</div>
        <div class="tab" onclick="switchTab('performance')">Performance</div>
    </div>

    <div id="platforms" class="tab-content active">
        <div class="card">
            <h2>Add Platform</h2>
            <input type="text" id="platformName" placeholder="Platform (e.g. TikTok)">
            <button onclick="addPlatform()">Add Platform</button>
        </div>
        <div id="platformList"></div>
    </div>

    <div id="content" class="tab-content">
        <div class="card">
            <h2>Track New Content</h2>
            <select id="platformSelect"></select>
            <select id="contentType">
                <option value="Reel">Reel</option>
                <option value="Post">Static Post</option>
                <option value="Story">Story</option>
            </select>
            <input type="number" id="views" placeholder="Views">
            <input type="number" id="likes" placeholder="Likes">
            <input type="number" id="comments" placeholder="Comments">
            <button onclick="addContent()">Save Entry</button>
        </div>
        <div id="contentList"></div>
    </div>

    <div id="performance" class="tab-content">
        <div class="card">
            <h3>Performance Insights <span class="info-icon" onclick="alert('Reach: Views\nEngagement: Likes/Comments\nConversion: Leads!')">ⓘ</span></h3>
            <canvas id="performanceChart"></canvas>
        </div>

        <div class="card">
            <h3>💰 Content Conversion</h3>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="calcVisits" placeholder="Clicks">
                <input type="number" id="calcBookings" placeholder="Inquiries">
            </div>
            <button onclick="calculateConversion()">Calculate Rate</button>
            <div id="conversionResult" class="result-box" style="display:none;"></div>
        </div>
    </div>

    <script>
        let platforms = JSON.parse(localStorage.getItem('bm_platforms')) || [];
        let contentData = JSON.parse(localStorage.getItem('bm_content')) || [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            const activeTab = event ? event.currentTarget : document.querySelector(`[onclick="switchTab('${tabId}')"]`);
            activeTab.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            if(tabId === 'performance') renderChart();
        }

        function addPlatform() {
            const name = document.getElementById('platformName').value;
            if(!name) return;
            platforms.push(name);
            localStorage.setItem('bm_platforms', JSON.stringify(platforms));
            document.getElementById('platformName').value = '';
            renderPlatforms();
        }

        function renderPlatforms() {
            const list = document.getElementById('platformList');
            const select = document.getElementById('platformSelect');
            list.innerHTML = platforms.map(p => `<div class="card" style="padding:10px;"><strong>${p}</strong></div>`).join('');
            select.innerHTML = platforms.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        function addContent() {
            const entry = {
                platform: document.getElementById('platformSelect').value,
                type: document.getElementById('contentType').value,
                views: parseInt(document.getElementById('views').value) || 0,
                likes: parseInt(document.getElementById('likes').value) || 0,
                comments: parseInt(document.getElementById('comments').value) || 0
            };
            contentData.push(entry);
            localStorage.setItem('bm_content', JSON.stringify(contentData));
            alert("Success!");
            renderContent();
        }

        function renderContent() {
            const list = document.getElementById('contentList');
            list.innerHTML = contentData.slice().reverse().map(c => `
                <div class="card">
                    <strong>${c.type}</strong> - ${c.platform}<br>
                    👁️ ${c.views} | ❤️ ${c.likes} | 💬 ${c.comments}
                </div>
            `).join('');
        }

        function calculateConversion() {
            const v = document.getElementById('calcVisits').value;
            const b = document.getElementById('calcBookings').value;
            const res = document.getElementById('conversionResult');
            if(v > 0) {
                const rate = ((b/v)*100).toFixed(1);
                res.style.display = 'block';
                res.innerHTML = `CONVERSION RATE: ${rate}% ${rate >= 3 ? '✅' : '📈'}`;
            }
        }

        let myChart;
        function renderChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: contentData.map((_, i) => i + 1),
                    datasets: [{
                        label: 'Likes',
                        data: contentData.map(c => c.likes),
                        backgroundColor: '#0d9488'
                    }]
                }
            });
        }

        renderPlatforms();
        renderContent();
    </script>
</body>
</html>
            });
        }
    </script>
</body>
</html>
